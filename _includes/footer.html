<footer class="site-footer">
  <div class="wrap footer-wrap">
    <div class="footer-brand">
      <span class="brand-name">Emily Barrera</span>
      <p>Movement as practice, performance, and play.</p>
    </div>
    <div class="footer-links">
      {% if site.instagram %}<a href="https://instagram.com/{{ site.instagram }}">Instagram</a>{% endif %}
      {% if site.youtube %}<a href="{{ site.youtube }}">YouTube</a>{% endif %}
      {% if site.email_public %}<a href="mailto:{{ site.email_public }}">Email</a>{% endif %}
      <a href="{{ '/feed.xml' | relative_url }}">Journal RSS</a>
    </div>
    <p class="footer-copy">© {{ 'now' | date: "%Y" }} Emily Barrera</p>
  </div>
</footer>
