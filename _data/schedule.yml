# ─────────────────────────────────────────────────────────────
#  Emily's weekly schedule — edit this file to update the page.
#  No coding needed: change the text between the quotes.
# ─────────────────────────────────────────────────────────────

# Status banner at the top of the Schedule page.
#   state: "in"  -> green "Teaching this week"
#   state: "out" -> amber "Away" notice
status:
  state: "in"
  headline: "Here this week"
  message: "See below for what's on each day. Days not listed are off."

# Dates Emily is away (leave dates: "" if none).
away:
  - dates: ""          # e.g. "July 20–24"
    reason: ""         # e.g. "Away for a workshop — back the 27th"

# Activity types + their colors (used for the tags and the legend).
# Add a new type here if Emily starts something new.
types:
  - key: "yoga"
    label: "Yoga"
    color: "#5c8271"      # seafoam green
  - key: "stretch"
    label: "Stretch Lab"
    color: "#a83a6d"      # berry / magenta
  - key: "dramaturgy"
    label: "Dramaturgy"
    color: "#6f4d7d"      # plum
  - key: "choreography"
    label: "Choreography"
    color: "#a8792f"      # gold / ochre

# Weekly schedule. For a day off, leave sessions empty:  sessions: []
# Each session's "type" must match a key from the list above.
week:
  - day: "Monday"
    sessions: []
  - day: "Tuesday"
    sessions: []
  - day: "Wednesday"
    sessions: []
  - day: "Thursday"
    sessions:
      - time: "6:00 PM"
        duration: "1 hr"
        title: "The Yoga Lab"
        type: "yoga"
  - day: "Friday"
    sessions: []
  - day: "Saturday"
    sessions: []
  - day: "Sunday"
    sessions:
      - time: "10:30 AM"
        duration: "1 hr"
        title: "The Yoga Lab"
        type: "yoga"
